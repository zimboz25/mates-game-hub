<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Ascent top-down schematic">
  <rect width="100" height="100" fill="#1a2733"/>
  <rect x="8" y="8" width="84" height="84" rx="2" fill="#243447" stroke="#3d5166" stroke-width="0.5"/>
  <!-- Mid -->
  <rect x="42" y="38" width="16" height="24" fill="#2f4155" stroke="#4a6078" stroke-width="0.4"/>
  <text x="50" y="52" text-anchor="middle" fill="#8b978f" font-size="3.5" font-family="sans-serif">MID</text>
  <!-- A site -->
  <rect x="8" y="8" width="28" height="32" fill="#2a3544" stroke="#ff4655" stroke-width="0.6" opacity="0.9"/>
  <text x="22" y="24" text-anchor="middle" fill="#ff4655" font-size="4" font-family="sans-serif" font-weight="bold">A</text>
  <!-- B site -->
  <rect x="64" y="8" width="28" height="32" fill="#2a3544" stroke="#ff4655" stroke-width="0.6" opacity="0.9"/>
  <text x="78" y="24" text-anchor="middle" fill="#ff4655" font-size="4" font-family="sans-serif" font-weight="bold">B</text>
  <!-- A main path -->
  <rect x="8" y="40" width="18" height="28" fill="#334155" stroke="#475569" stroke-width="0.3"/>
  <!-- B market path -->
  <rect x="74" y="40" width="18" height="28" fill="#334155" stroke="#475569" stroke-width="0.3"/>
  <!-- Spawn areas -->
  <rect x="30" y="72" width="40" height="20" fill="#1e293b" stroke="#475569" stroke-width="0.4"/>
  <text x="50" y="84" text-anchor="middle" fill="#64748b" font-size="3" font-family="sans-serif">ATK SPAWN</text>
</svg>
