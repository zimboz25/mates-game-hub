<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Haven top-down schematic">
  <rect width="100" height="100" fill="#1a2733"/>
  <rect x="8" y="8" width="84" height="84" rx="2" fill="#243447" stroke="#3d5166" stroke-width="0.5"/>
  <!-- A site -->
  <rect x="8" y="8" width="24" height="28" fill="#2a3544" stroke="#ff4655" stroke-width="0.6"/>
  <text x="20" y="24" text-anchor="middle" fill="#ff4655" font-size="4" font-family="sans-serif" font-weight="bold">A</text>
  <!-- B site -->
  <rect x="38" y="8" width="24" height="28" fill="#2a3544" stroke="#ff4655" stroke-width="0.6"/>
  <text x="50" y="24" text-anchor="middle" fill="#ff4655" font-size="4" font-family="sans-serif" font-weight="bold">B</text>
  <!-- C site -->
  <rect x="68" y="8" width="24" height="28" fill="#2a3544" stroke="#ff4655" stroke-width="0.6"/>
  <text x="80" y="24" text-anchor="middle" fill="#ff4655" font-size="4" font-family="sans-serif" font-weight="bold">C</text>
  <!-- C long -->
  <rect x="68" y="36" width="24" height="32" fill="#334155" stroke="#475569" stroke-width="0.3"/>
  <!-- Mid / garage area -->
  <rect x="32" y="40" width="36" height="28" fill="#2f4155" stroke="#4a6078" stroke-width="0.4"/>
  <rect x="30" y="72" width="40" height="20" fill="#1e293b" stroke="#475569" stroke-width="0.4"/>
  <text x="50" y="84" text-anchor="middle" fill="#64748b" font-size="3" font-family="sans-serif">ATK SPAWN</text>
</svg>
